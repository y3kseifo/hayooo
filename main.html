<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Haya ❤️ Us</title>

<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    overflow:hidden;
    font-family:'Poppins',sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(-45deg,#ff4d8d,#6c5ce7,#00c2ff,#ffb3d9);
    background-size:400% 400%;
    animation:bg 12s ease infinite;
}

@keyframes bg{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

/* blobs */
.blob{
    position:absolute;
    border-radius:50%;
    filter:blur(90px);
    opacity:.6;
}

.blob1{
    width:300px;height:300px;
    background:#ff4d8d;
    top:-100px;left:-100px;
}

.blob2{
    width:350px;height:350px;
    background:#6c5ce7;
    bottom:-120px;right:-120px;
}

/* CARD */
.card{
    width:90%;
    max-width:650px;
    text-align:center;
    padding:50px;
    border-radius:30px;

    background:rgba(255,255,255,0.12);
    backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,0.25);

    box-shadow:0 10px 40px rgba(0,0,0,0.2);
}

h1{
    font-family:'Pacifico',cursive;
    font-size:4rem;
    color:white;
    text-shadow:0 0 20px rgba(255,255,255,.8);
}

.heart{
    display:inline-block;
    animation:beat 1s infinite;
}

@keyframes beat{
    0%,100%{transform:scale(1);}
    50%{transform:scale(1.3);}
}

.subtitle{
    color:white;
    margin-top:10px;
}

/* button */
button{
    margin-top:20px;
    padding:12px 28px;
    border:none;
    border-radius:50px;
    font-weight:600;
    cursor:pointer;
    background:white;
    color:#ff4d8d;
    transition:.3s;
}

button:hover{
    transform:scale(1.08);
}

/* timer */
.timer{
    margin-top:20px;
    color:white;
    font-size:1.1rem;
    display:none;
}

/* hearts */
.float{
    position:absolute;
    animation:floatUp linear forwards;
}

@keyframes floatUp{
    from{transform:translateY(0);opacity:1;}
    to{transform:translateY(-120vh);opacity:0;}
}

/* 💖 BITMOJI BADGE */
.bitmoji-badge{
    position:fixed;
    top:15px;
    left:15px;
    display:flex;
    align-items:center;
    gap:10px;

    padding:10px 14px;
    border-radius:50px;

    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(15px);
    border:1px solid rgba(255,255,255,0.3);

    color:white;
    font-weight:600;
    font-size:0.9rem;

    box-shadow:0 0 20px rgba(255,255,255,0.3);
    animation:pulse 2s infinite;
    text-decoration:none;
}

.bitmoji-badge img{
    width:40px;
    height:40px;
    border-radius:50%;
    object-fit:cover;
}

@keyframes pulse{
    0%,100%{transform:scale(1);}
    50%{transform:scale(1.05);}
}
</style>
</head>

<body>

<!-- 💖 BITMOJI CORNER -->
<a class="bitmoji-badge" href="https://ibb.co/KpytYDFd" target="_blank">
    <img src="https://i.ibb.co/HDHp776Z/Screen-Shot-2026-06-19-at-5-55-49-PM-removebg-preview.png">
    Seifoo Loves Hayoo 💖
</a>

<div class="blob blob1"></div>
<div class="blob blob2"></div>

<div class="card">
    <h1>Haya <span class="heart">❤️</span></h1>
    <p class="subtitle">Every second with you feels unreal ✨</p>

    <button onclick="toggleTimer()">💖 How long have we been dating?</button>

    <div class="timer" id="timer"></div>
</div>

<script>
const startDate = new Date("June 16, 2026 15:00:00");

function format(ms){
    let s=Math.floor(ms/1000);

    const Y=31536000, M=2629800, W=604800,
          D=86400, H=3600, MIN=60;

    let y=Math.floor(s/Y); s%=Y;
    let m=Math.floor(s/M); s%=M;
    let w=Math.floor(s/W); s%=W;
    let d=Math.floor(s/D); s%=D;
    let h=Math.floor(s/H); s%=H;
    let min=Math.floor(s/MIN); s%=MIN;

    let out=[];
    if(y>0) out.push(y+" YEAR");
    if(m>0) out.push(m+" MONTH");
    if(w>0) out.push(w+" WEEK");
    if(d>0) out.push(d+" DAY");
    if(h>0) out.push(h+" HR");
    if(min>0) out.push(min+" MIN");

    out.push(s+" SEC");

    return out.join(" : ");
}

function update(){
    document.getElementById("timer").innerHTML =
        "💞 Together for:<br><b>" + format(Date.now()-startDate) + "</b>";
}

setInterval(update,1000);

function toggleTimer(){
    const t=document.getElementById("timer");
    t.style.display = t.style.display==="block" ? "none" : "block";

    for(let i=0;i<20;i++){
        setTimeout(()=>{
            const e=document.createElement("div");
            e.className="float";
            e.innerHTML=["❤️","💖","✨","💕"][Math.floor(Math.random()*4)];
            e.style.left=Math.random()*100+"vw";
            e.style.fontSize=(20+Math.random()*25)+"px";
            e.style.bottom="-20px";
            e.style.animationDuration=(3+Math.random()*3)+"s";
            document.body.appendChild(e);
            setTimeout(()=>e.remove(),6000);
        },i*80);
    }
}
</script>

</body>
</html>
