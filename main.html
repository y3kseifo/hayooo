<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I Love Haya ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:'Poppins',sans-serif;
    background:linear-gradient(-45deg,#ff9a9e,#fad0c4,#ffdde1,#fcb69f);
    background-size:400% 400%;
    animation:bgMove 12s ease infinite;
}

@keyframes bgMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.card{
    position:relative;
    padding:50px;
    text-align:center;
    border-radius:30px;
    backdrop-filter:blur(15px);
    background:rgba(255,255,255,0.15);
    border:1px solid rgba(255,255,255,0.3);
    box-shadow:0 8px 32px rgba(0,0,0,0.15);
    animation:appear 1.5s ease;
}

@keyframes appear{
    from{
        opacity:0;
        transform:translateY(40px) scale(.8);
    }
    to{
        opacity:1;
        transform:translateY(0) scale(1);
    }
}

h1{
    font-family:'Pacifico',cursive;
    font-size:4.5rem;
    color:white;
    text-shadow:0 0 15px rgba(255,255,255,.8);
}

.name{
    color:#ff4f87;
}

.subtitle{
    margin-top:15px;
    color:white;
    font-size:1.1rem;
}

.heart{
    display:inline-block;
    animation:beat 1s infinite;
}

@keyframes beat{
    0%,100%{transform:scale(1);}
    25%{transform:scale(1.3);}
    50%{transform:scale(1.1);}
    75%{transform:scale(1.4);}
}

.floating{
    position:absolute;
    color:white;
    pointer-events:none;
    animation:floatUp linear forwards;
}

@keyframes floatUp{
    from{
        transform:translateY(0) scale(0.5);
        opacity:1;
    }
    to{
        transform:translateY(-110vh) scale(1.5);
        opacity:0;
    }
}

.sparkle{
    position:absolute;
    color:white;
    animation:twinkle 2s infinite;
}

@keyframes twinkle{
    0%,100%{
        opacity:.3;
        transform:scale(.8);
    }
    50%{
        opacity:1;
        transform:scale(1.3);
    }
}

.button{
    margin-top:25px;
    padding:12px 28px;
    border:none;
    border-radius:50px;
    background:white;
    color:#ff4f87;
    font-weight:600;
    cursor:pointer;
    transition:.3s;
}

.button:hover{
    transform:scale(1.08);
    box-shadow:0 0 20px rgba(255,255,255,.8);
}
</style>
</head>

<body>

<div class="card">
    <h1>
        I Love <span class="name">Haya</span>
        <span class="heart">❤️</span>
    </h1>

    <p class="subtitle">
        You make every day brighter ✨
    </p>

    <button class="button" onclick="showLove()">
        Send Love 💌
    </button>
</div>

<script>
function createHeart(){
    const heart=document.createElement("div");
    heart.classList.add("floating");

    const symbols=["❤️","💖","💕","💗","🌸","✨"];
    heart.innerHTML=symbols[Math.floor(Math.random()*symbols.length)];

    heart.style.left=Math.random()*window.innerWidth+"px";
    heart.style.bottom="-30px";
    heart.style.fontSize=(20+Math.random()*30)+"px";
    heart.style.animationDuration=(4+Math.random()*4)+"s";

    document.body.appendChild(heart);

    setTimeout(()=>{
        heart.remove();
    },8000);
}

setInterval(createHeart,350);

function showLove(){
    for(let i=0;i<25;i++){
        setTimeout(createHeart,i*80);
    }
}

for(let i=0;i<20;i++){
    const star=document.createElement("div");
    star.classList.add("sparkle");
    star.innerHTML="✨";
    star.style.left=Math.random()*100+"vw";
    star.style.top=Math.random()*100+"vh";
    star.style.animationDelay=Math.random()*2+"s";
    document.body.appendChild(star);
}
</script>

</body>
</html>
